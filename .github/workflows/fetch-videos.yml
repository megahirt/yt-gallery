name: Fetch YouTube Videos

on:
  workflow_dispatch: # manual trigger from the Actions tab
  schedule:
    - cron: "0 4 * * *" # daily at 04:00 UTC — adjust or remove as needed

permissions:
  contents: write # needed to create/delete releases and tags

jobs:
  fetch:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fetch

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - name: Write credentials from secrets
        # Single quotes around the secret prevent the shell from interpreting
        # JSON special characters (braces, quotes, etc.)
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN_JSON }}' > token.json
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET_JSON }}' > client_secret.json

      - name: Fetch videos
        run: uv run fetch_videos.py

      - name: Generate simplified video list
        run: uv run make_simple_video_list.py

      - name: Upload videos.json as artifact
        uses: actions/upload-artifact@v7
        with:
          name: videos-json
          path: fetch/videos.json

      - name: Delete existing rolling release and tag (videos)
        # Idempotent cleanup: if release/tag does not exist yet, continue without failing.
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = 'videos';

            // Delete release by tag if it exists.
            try {
              const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id
              });
              core.info(`Deleted existing release for tag ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}`);
              } else {
                throw error;
              }
            }

            // Delete tag ref if it exists.
            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`
              });
              core.info(`Deleted existing tag ${tag}`);
            } catch (error) {
              if (error.status === 422 || error.status === 404) {
                core.info(`No existing tag found for ${tag}`);
              } else {
                throw error;
              }
            }

      - name: Publish rolling release (videos) with videos.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: videos
          name: Rolling videos.json build
          body: |
            Auto-published by fetch-videos workflow.
            Contains videos.json as a direct release asset.
          files: fetch/videos.json
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
